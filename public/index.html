<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SecureAuth Frontend</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h1 class="text-center mb-4">SecureAuth Interface</h1>

    <!-- Register + Login -->
    <div id="authForms" class="card p-4 mb-4">
      <h2>Register</h2>
      <form id="registerForm">
        <input type="text" id="regUsername" class="form-control mb-2" placeholder="Username" required />
        <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email" required />
        <input type="password" id="regPassword" class="form-control mb-2" placeholder="Password" required />
        <button type="submit" class="btn btn-primary">Register</button>
      </form>

      <h2 class="mt-4">Login</h2>
      <form id="loginForm">
        <input type="email" id="loginEmail" class="form-control mb-2" placeholder="Email" required />
        <input type="password" id="loginPassword" class="form-control mb-2" placeholder="Password" required />
        <button type="submit" class="btn btn-success">Login</button>
      </form>
    </div>

    <!-- Profile + Logout -->
    <div id="userActions" class="card p-4 mb-4" style="display:none;">
      <h2>Profile</h2>
      <button id="profileBtn" class="btn btn-info mb-3">View Profile</button>

      <h2>Logout</h2>
      <button id="logoutBtn" class="btn btn-danger">Logout</button>
    </div>

    <div id="output" class="mt-3"></div>
  </div>

  <script>
    async function postData(url, data) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      return res.json();
    }

    async function checkSession() {
      const res = await fetch("/auth/profile");
      const result = await res.json();

      const authForms = document.getElementById("authForms");
      const userActions = document.getElementById("userActions");
      const output = document.getElementById("output");

      if (result.success) {
        authForms.style.display = "none";
        userActions.style.display = "block";
        output.innerHTML = `<div class="alert alert-success">Welcome back, ${result.user.username}</div>`;
      } else {
        authForms.style.display = "block";
        userActions.style.display = "none";
        output.innerHTML = "";
      }
    }

    window.onload = checkSession;

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = {
        username: document.getElementById("regUsername").value,
        email: document.getElementById("regEmail").value,
        password: document.getElementById("regPassword").value
      };
      const result = await postData("/auth/register", data);

      const output = document.getElementById("output");
      if (result.errors) {
        output.innerHTML = result.errors.map(err => `<div class="alert alert-danger">${err.msg}</div>`).join("");
      } else if (result.error) {
        output.innerHTML = `<div class="alert alert-danger">${result.error}</div>`;
      } else if (result.success) {
        output.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = {
        email: document.getElementById("loginEmail").value,
        password: document.getElementById("loginPassword").value
      };
      const result = await postData("/auth/login", data);

      const output = document.getElementById("output");
      if (result.errors) {
        output.innerHTML = result.errors.map(err => `<div class="alert alert-danger">${err.msg}</div>`).join("");
      } else if (result.error) {
        output.innerHTML = `<div class="alert alert-danger">${result.error}</div>`;
      } else if (result.success) {
        output.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
        checkSession(); // update UI after login
      }
    });

    document.getElementById("profileBtn").addEventListener("click", async () => {
      const res = await fetch("/auth/profile");
      const result = await res.json();

      const output = document.getElementById("output");
      if (result.error) {
        output.innerHTML = `<div class="alert alert-danger">${result.error}</div>`;
      } else if (result.success) {
        output.innerHTML = `<div class="alert alert-success">Logged in user: ${JSON.stringify(result.user, null, 2)}</div>`;
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      const res = await fetch("/auth/logout");
      const result = await res.json();

      const output = document.getElementById("output");
      if (result.error) {
        output.innerHTML = `<div class="alert alert-danger">${result.error}</div>`;
      } else {
        output.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
        checkSession(); // update UI after logout
      }
    });
  </script>
</body>
</html>
